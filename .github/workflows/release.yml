name: Build and release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag. Defaults to v<pubspec version>, for example v1.0.0."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build Windows exe
    runs-on: windows-2022
    env:
      CMAKE_GENERATOR: "Visual Studio 17 2022"
      CMAKE_GENERATOR_PLATFORM: "x64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows release
        shell: pwsh
        run: |
          $releaseDir = "build\windows\x64\runner\Release"
          $zipPath = "dist\file_transfer_assistant-windows-x64.zip"

          if (-not (Test-Path $releaseDir)) {
            throw "Windows release directory not found: $releaseDir"
          }

          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          Compress-Archive -Path "$releaseDir\*" -DestinationPath $zipPath -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/file_transfer_assistant-windows-x64.zip
          if-no-files-found: error

  build-android:
    name: Build Android APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build split APKs
        run: flutter build apk --release --split-per-abi

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*-release.apk
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve release tag
        id: release_tag
        env:
          INPUT_TAG_NAME: ${{ github.event.inputs.tag_name || '' }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${INPUT_TAG_NAME}" ]]; then
            tag="${INPUT_TAG_NAME}"
          else
            version="$(grep -E '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
            if [[ -z "${version}" ]]; then
              echo "Could not resolve version from pubspec.yaml."
              exit 1
            fi
            tag="v${version}"
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          assets=(release-assets/*)

          if (( ${#assets[@]} == 0 )); then
            echo "No release assets found."
            exit 1
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${assets[@]}" \
              --target "${GITHUB_SHA}" \
              --title "Release ${RELEASE_TAG}" \
              --notes "Automated release for ${RELEASE_TAG}."
          fi
